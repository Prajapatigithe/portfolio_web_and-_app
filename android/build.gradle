// android/build.gradle
buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()               // Needed to fetch AsyncStorage
        maven { url 'https://www.jitpack.io' }
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
        classpath("com.facebook.react:react-native-gradle-plugin:0.84.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.1")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
        // AsyncStorage v3 ships storage-android AAR in the package (not on Maven Central)
        maven {
            url = uri("${rootDir}/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
        }
    }
}

apply plugin: "com.facebook.react.rootproject"